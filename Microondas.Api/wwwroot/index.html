<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-ondas Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="auth-status">
                <div class="indicator" id="auth-indicator"></div>
                <span id="auth-text">Não Autenticado</span>
            </div>
        </div>
        
        <div class="header-right">
                <div class="login-form" id="login-form">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Usuário" value="admin" aria-label="Nome de usuário">
                        <input type="password" id="password" placeholder="Senha" value="123456" aria-label="Senha">
                    </div>
                <button onclick="login()" class="btn-login">Login</button>
            </div>
            <div id="auth-actions" style="display: none; gap: 1rem; align-items: center;">
                <button class="btn-icon" onclick="abrirModalConfig()" title="Configurações">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
                <button id="logout-btn" class="btn-logout" onclick="logout()">Sair</button>
            </div>
        </div>
    </div>

    <div class="app-container" id="app-container">
        
        <div class="microwave">
            <div class="door">
                <div class="heating-string" id="heating-string"></div>
            </div>
            <div class="panel">
                <div class="display">
                    <div class="display-time" id="display-time">00:00</div>
                    <div class="display-power" id="display-power">Potência: 10</div>
                    <div class="display-info" id="display-info">Pronto</div>
                    <div class="display-alert" id="display-alert"></div>
                </div>

                <div class="numpad">
                    <button onclick="appendNum(1)">1</button>
                    <button onclick="appendNum(2)">2</button>
                    <button onclick="appendNum(3)">3</button>
                    <button onclick="appendNum(4)">4</button>
                    <button onclick="appendNum(5)">5</button>
                    <button onclick="appendNum(6)">6</button>
                    <button onclick="appendNum(7)">7</button>
                    <button onclick="appendNum(8)">8</button>
                    <button onclick="appendNum(9)">9</button>
                    <button onclick="setPower()">POT</button>
                    <button onclick="appendNum(0)">0</button>
                    <button onclick="clearInput()">C</button>
                </div>

                <div class="controls">
                    <button class="btn-start" onclick="startMicrowave()">INÍCIO / +30 SEG</button>
                    <button class="btn-stop" onclick="stopMicrowave()">STOP / CANCELAR</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <h2>Programas</h2>
            <div class="program-list" id="program-list">
                <!-- Programas injetados via JS -->
            </div>
            <button style="margin-top: 1rem; width: 100%; font-size: 0.9rem" onclick="abrirModalCadastro()">+ Cadastrar Novo</button>
        </div>
    </div>
    
    <div class="modal" id="modal-config">
        <div class="modal-content">
            <h3>Configurar Credenciais</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Altere sua senha de acesso ao sistema.</p>
            <div class="input-group-vertical">
                <label for="new-password">Nova Senha</label>
                <input type="password" id="new-password" placeholder="Digite a nova senha">
            </div>
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <button onclick="salvarConfig()" style="flex: 1">Atualizar</button>
                <button onclick="fecharModalConfig()" style="flex: 1; background: var(--surface-color); border: 1px solid var(--surface-border)">Fechar</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-cadastro">
        <div class="modal-content">
            <h3>Cadastrar Programa</h3>
            <div class="input-group-vertical">
                <label for="prog-nome">Nome do Programa</label>
                <input type="text" id="prog-nome" placeholder="Ex: Pipoca">
            </div>
            <div class="input-group-vertical">
                <label for="prog-alimento">Alimento</label>
                <input type="text" id="prog-alimento" placeholder="Ex: Milho de pipoca">
            </div>
            <div class="input-group-vertical">
                <label for="prog-tempo">Tempo (segundos)</label>
                <input type="number" id="prog-tempo" placeholder="1 a 120">
            </div>
            <div class="input-group-vertical">
                <label for="prog-potencia">Potência</label>
                <input type="number" id="prog-potencia" placeholder="1 a 10" min="1" max="10" value="10">
            </div>
            <div class="input-group-vertical">
                <label for="prog-caractere">Caractere de Aquecimento</label>
                <input type="text" id="prog-caractere" placeholder="Ex: *" maxlength="1">
            </div>
            <div class="input-group-vertical">
                <label for="prog-instrucoes">Instruções (Opcional)</label>
                <textarea id="prog-instrucoes" placeholder="Instruções de preparo..."></textarea>
            </div>
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <button onclick="salvarNovoPrograma()" style="flex: 1">Salvar</button>
                <button onclick="fecharModalCadastro()" style="flex: 1; background: var(--danger)">Cancelar</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
